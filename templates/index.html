<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ agent_name }} — Chat</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --primary: #0078d4;
      --primary-hover: #106ebe;
      --user-bubble: #0078d4;
      --bot-bubble: #e8e8e8;
      --text: #1a1a1a;
      --text-light: #666;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--panel);
      padding: 16px 24px;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header button {
      background: none;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-light);
    }
    header button:hover { border-color: var(--primary); color: var(--primary); }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bubble);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot-bubble);
      border-bottom-left-radius: 4px;
    }
    .msg.error {
      align-self: center;
      background: #fde7e9;
      color: #a80000;
      font-size: 13px;
    }
    .typing {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 12px 16px;
    }
    .typing span {
      width: 8px; height: 8px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing span:nth-child(1) { animation-delay: -0.32s; }
    .typing span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    #input-area {
      background: var(--panel);
      border-top: 1px solid #ddd;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
    }
    #input-area textarea {
      flex: 1;
      resize: none;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      min-height: 44px;
      max-height: 120px;
    }
    #input-area textarea:focus { border-color: var(--primary); }
    #send-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #send-btn:hover { background: var(--primary-hover); }
    #send-btn:disabled { opacity: .5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>{{ agent_name }}</h1>
    <button onclick="resetChat()">New conversation</button>
  </header>
  <div id="chat"></div>
  <div id="input-area">
    <textarea id="msg" rows="1" placeholder="Type a message…" autofocus></textarea>
    <button id="send-btn" onclick="send()">Send</button>
  </div>
  <script>
    const chat = document.getElementById("chat");
    const msgInput = document.getElementById("msg");
    const sendBtn = document.getElementById("send-btn");

    msgInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });
    msgInput.addEventListener("input", () => {
      msgInput.style.height = "auto";
      msgInput.style.height = msgInput.scrollHeight + "px";
    });

    function addBubble(text, cls) {
      const div = document.createElement("div");
      div.className = "msg " + cls;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }
    function showTyping() {
      const div = document.createElement("div");
      div.className = "typing";
      div.id = "typing";
      div.innerHTML = "<span></span><span></span><span></span>";
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }
    function hideTyping() {
      const el = document.getElementById("typing");
      if (el) el.remove();
    }

    async function send() {
      const text = msgInput.value.trim();
      if (!text) return;
      msgInput.value = "";
      msgInput.style.height = "auto";
      addBubble(text, "user");
      sendBtn.disabled = true;
      showTyping();
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        hideTyping();
        if (data.error) {
          addBubble(data.error, "error");
        } else {
          addBubble(data.reply, "bot");
        }
      } catch (err) {
        hideTyping();
        addBubble("Network error — is the server running?", "error");
      }
      sendBtn.disabled = false;
      msgInput.focus();
    }

    async function resetChat() {
      await fetch("/api/reset", { method: "POST" });
      chat.innerHTML = "";
    }
  </script>
</body>
</html>
